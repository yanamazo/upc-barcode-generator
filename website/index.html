<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>UPC Barcode Generator Installed</title>
    <style>
      * {
        box-sizing: border-box;
      }

      html {
        scroll-behavior: smooth;
      }

      body {
        margin: 0;
        color: #071021;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f7faff;
      }

      .hero {
        display: grid;
        min-height: auto;
        place-items: center;
        padding: 24px 40px 20px;
        text-align: center;
        background: #ffffff;
      }

      h1 {
        max-width: 1180px;
        margin: 0;
        font-size: 42px;
        line-height: 0.98;
        letter-spacing: 0;
      }

      .steps {
        display: grid;
        gap: 18px;
        width: 900px;
        margin: 0 auto;
        padding: 18px 0 72px;
      }

      .step {
        margin: 0;
        overflow: hidden;
        border-radius: 8px;
        background: #ffffff;
        box-shadow: 0 20px 58px rgba(15, 30, 60, 0.12);
      }

      .step img {
        display: block;
        width: 100%;
        height: auto;
      }

      .arrow {
        display: grid;
        place-items: center;
        height: 54px;
        margin: -34px 0 -6px;
        position: relative;
        z-index: 2;
        color: #0b5cff;
        text-decoration: none;
      }

      .arrow svg {
        width: 42px;
        height: 42px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.92);
        box-shadow: 0 8px 22px rgba(11, 92, 255, 0.2);
      }
    </style>
  </head>
  <body>
    <header class="hero">
      <h1>UPC Barcode Generator Installed</h1>
    </header>

    <main class="steps" aria-label="UPC Barcode Generator usage steps">
      <figure id="step-1" class="step">
        <img src="usage_step_1%20(for%20landing).png" alt="Pin the UPC Barcode Generator extension from Chrome's extensions menu">
      </figure>
      <a class="arrow" href="#step-2" aria-label="Scroll to next setup step">
        <svg viewBox="0 0 24 24" fill="none">
          <path d="M12 4v15m0 0 7-7m-7 7-7-7" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"></path>
        </svg>
      </a>
      <figure id="step-2" class="step">
        <img src="usage_step_2%20(for%20landing).png" alt="Enter UPC codes and generate barcodes in the extension popup">
      </figure>
      <a class="arrow" href="#step-3" aria-label="Scroll to next setup step">
        <svg viewBox="0 0 24 24" fill="none">
          <path d="M12 4v15m0 0 7-7m-7 7-7-7" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"></path>
        </svg>
      </a>
      <figure id="step-3" class="step">
        <img src="usage_step_3%20(for%20landing).png" alt="Customize and print generated UPC barcodes">
      </figure>
    </main>
  </body>
</html>
